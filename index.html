<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UniKL Pro Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        h2 { margin-bottom: 5px; }
        
        canvas {
            border: 3px solid #00ff00;
            border-radius: 12px;
            max-width: 90%;
            background-color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            margin-top: 5px;
        }
        
        .controls {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80%;
            background: #222;
            padding: 15px;
            border-radius: 10px;
        }
        input[type=range] { width: 100%; margin-top: 10px; }
        
        #status {
            margin-top: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            background: #1a1a1a;
            width: 80%;
        }

        /* NEW: The Output Card that shows up after scanning */
        #outputCard {
            display: none; /* Hidden until we catch something */
            background: #1e1e1e;
            border: 2px solid #00ff00;
            padding: 20px;
            border-radius: 12px;
            width: 85%;
            margin-top: 15px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
            word-wrap: break-word;
        }
        #outputCard h3 { color: #00ff00; margin-top: 0; text-align: center; }
        .data-label { color: #aaaaaa; font-size: 0.9rem; }
        .data-value { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }
        #rawJsonBox {
            background: #000;
            padding: 10px;
            border-radius: 5px;
            color: #00ff00;
            font-family: monospace;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: #00ff00;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }
        .submit-btn:active { background: #00cc00; }
    </style>
</head>
<body>

    <h2>UniKL Pro Scanner 🔎</h2>
    
    <video id="video" playsinline hidden></video>
    <canvas id="canvas" width="300" height="300"></canvas>
    
    <div class="controls" id="zoomControls">
        <label for="zoomSlider">Zoom Level: <span id="zoomValue">2.0</span>x</label>
        <input type="range" id="zoomSlider" min="1.0" max="6.0" step="0.1" value="2.0">
    </div>
    
    <div id="status">Requesting camera...</div>

    <!-- NEW: The Output Data Card -->
    <div id="outputCard">
        <h3>Data Captured!</h3>
        <div class="data-label">Session ID:</div>
        <div class="data-value" id="outSession">---</div>
        
        <div class="data-label">Raw Payload:</div>
        <div id="rawJsonBox"></div>
        
        <button class="submit-btn" id="proceedBtn">Proceed to ECitizen</button>
    </div>

    <script>
        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const statusDiv = document.getElementById("status");
        const zoomSlider = document.getElementById("zoomSlider");
        const zoomValue = document.getElementById("zoomValue");
        
        // UI Elements for the output
        const outputCard = document.getElementById("outputCard");
        const zoomControls = document.getElementById("zoomControls");
        const outSession = document.getElementById("outSession");
        const rawJsonBox = document.getElementById("rawJsonBox");
        const proceedBtn = document.getElementById("proceedBtn");
        
        let scanning = true;

        zoomSlider.addEventListener('input', function() {
            zoomValue.innerText = this.value;
        });

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(function(stream) {
                video.srcObject = stream;
                video.setAttribute("playsinline", true);
                video.play();
                statusDiv.innerText = "Scanning for QR...";
                requestAnimationFrame(tick);
            })
            .catch(function(err) {
                statusDiv.style.color = "#ff4444";
                statusDiv.innerText = "Camera access denied.";
            });

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA && scanning) {
                
                const currentZoom = parseFloat(zoomSlider.value);
                const cropWidth = video.videoWidth / currentZoom;
                const cropHeight = video.videoHeight / currentZoom;
                const startX = (video.videoWidth - cropWidth) / 2;
                const startY = (video.videoHeight - cropHeight) / 2;

                ctx.drawImage(video, startX, startY, cropWidth, cropHeight, 0, 0, canvas.width, canvas.height);

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });

                if (code) {
                    try {
                        const qrPayload = JSON.parse(code.data);
                        
                        if (qrPayload.session) {
                            scanning = false; // Stop the camera loop
                            
                            // 1. Hide the camera UI
                            canvas.style.display = "none";
                            zoomControls.style.display = "none";
                            statusDiv.style.display = "none";
                            
                            // 2. Show the Output Card and fill in the data
                            outputCard.style.display = "block";
                            outSession.innerText = qrPayload.session;
                            rawJsonBox.innerText = JSON.stringify(qrPayload, null, 2); // Pretty-print the JSON
                            
                            // 3. Set up the Proceed Button
                            const targetUrl = "https://ecitizen.unikl.edu.my/attendance?session=" + qrPayload.session;
                            proceedBtn.onclick = function() {
                                window.location.href = targetUrl;
                            };
                        }
                    } catch (e) {
                        if (code.data.includes("unikl.edu.my")) {
                            scanning = false;
                            
                            canvas.style.display = "none";
                            zoomControls.style.display = "none";
                            statusDiv.style.display = "none";
                            
                            outputCard.style.display = "block";
                            outSession.innerText = "N/A (Standard Web Link)";
                            rawJsonBox.innerText = code.data;
                            
                            proceedBtn.onclick = function() {
                                window.location.href = code.data;
                            };
                        }
                    }
                }
            }
            if (scanning) {
                requestAnimationFrame(tick);
            }
        }
    </script>
</body>
</html>
