<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UniKL Pro Scanner</title>
    <!-- Import jsQR library for decoding -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        h2 { margin-bottom: 5px; }
        .instructions {
            font-size: 0.85rem;
            color: #aaaaaa;
            margin-bottom: 10px;
            text-align: center;
        }
        
        /* The canvas acts as our "zoomed" viewport */
        canvas {
            border: 3px solid #00ff00;
            border-radius: 12px;
            max-width: 90%;
            background-color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            margin-top: 5px;
        }
        
        /* Slider styling */
        .controls {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80%;
            background: #222;
            padding: 15px;
            border-radius: 10px;
        }
        input[type=range] {
            width: 100%;
            margin-top: 10px;
        }
        
        #status {
            margin-top: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            background: #1a1a1a;
            width: 80%;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <h2>UniKL Pro Scanner 🔎</h2>
    <div class="instructions">Log into ECitizen first.</div>
    
    <!-- Hidden video element to grab the raw camera feed -->
    <video id="video" playsinline hidden></video>
    
    <!-- Canvas to display the digitally zoomed crop -->
    <canvas id="canvas" width="300" height="300"></canvas>
    
    <!-- Zoom Slider -->
    <div class="controls">
        <label for="zoomSlider">Zoom Level: <span id="zoomValue">2.0</span>x</label>
        <input type="range" id="zoomSlider" min="1.0" max="6.0" step="0.1" value="2.0">
    </div>
    
    <div id="status">Requesting camera...</div>

    <script>
        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const statusDiv = document.getElementById("status");
        const zoomSlider = document.getElementById("zoomSlider");
        const zoomValue = document.getElementById("zoomValue");
        
        let scanning = true;

        // Update zoom text when slider moves
        zoomSlider.addEventListener('input', function() {
            zoomValue.innerText = this.value;
        });

        // Request access to the rear camera
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(function(stream) {
                video.srcObject = stream;
                video.setAttribute("playsinline", true); // Required for iOS Safari
                video.play();
                statusDiv.innerText = "Scanning for QR...";
                requestAnimationFrame(tick);
            })
            .catch(function(err) {
                statusDiv.style.color = "#ff4444";
                statusDiv.innerText = "Camera access denied. Check phone settings.";
                console.error("Camera error:", err);
            });

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA && scanning) {
                
                // Get the LIVE zoom factor from your slider
                const currentZoom = parseFloat(zoomSlider.value);
                
                // Calculate the crop area based on the slider's zoom factor
                const cropWidth = video.videoWidth / currentZoom;
                const cropHeight = video.videoHeight / currentZoom;
                
                // Center the crop
                const startX = (video.videoWidth - cropWidth) / 2;
                const startY = (video.videoHeight - cropHeight) / 2;

                // Draw the zoomed video onto the canvas
                ctx.drawImage(video, startX, startY, cropWidth, cropHeight, 0, 0, canvas.width, canvas.height);

                // Scan the canvas
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: "dontInvert",
                });

                if (code) {
                    try {
                        // 1. TRY TO PARSE AS UNIKL JSON
                        const qrPayload = JSON.parse(code.data);
                        
                        if (qrPayload.session && qrPayload.attendanceType) {
                            scanning = false; // Stop scanning
                            canvas.style.borderColor = "#00ff00";
                            statusDiv.style.color = "#00ff00";
                            statusDiv.innerText = "Extracted Session: " + qrPayload.session + "\nRedirecting...";
                            
                            // Construct the URL using the session ID
                            const targetUrl = "https://ecitizen.unikl.edu.my/attendance?session=" + qrPayload.session;
                            
                            setTimeout(() => {
                                window.location.href = targetUrl;
                            }, 1500);
                        } else {
                            statusDiv.style.color = "#ffaa00";
                            statusDiv.innerText = "Ignored: JSON found, but no UniKL session ID.";
                        }
                        
                    } catch (e) {
                        // 2. FALLBACK: IF IT'S A NORMAL LINK INSTEAD OF JSON
                        if (code.data.includes("unikl.edu.my")) {
                            scanning = false; // Stop scanning
                            canvas.style.borderColor = "#00ff00";
                            statusDiv.style.color = "#00ff00";
                            statusDiv.innerText = "Success! Redirecting...";
                            
                            setTimeout(() => {
                                window.location.href = code.data;
                            }, 1000);
                        } else {
                            // It's a completely random QR code (like a restaurant menu)
                            statusDiv.style.color = "#ffaa00";
                            statusDiv.innerText = "Ignored: Not a UniKL QR Code.";
                        }
                    }
                } else {
                    // Reset text when looking for a code
                    statusDiv.style.color = "#ffffff";
                    statusDiv.innerText = "Scanning for QR...";
                }
            }
            
            // Keep looping
            if (scanning) {
                requestAnimationFrame(tick);
            }
        }
    </script>
</body>
</html>
